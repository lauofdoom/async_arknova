# Development overrides — use with: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
name: arknova-async-dev

services:
  bot:
    build:
      target: dev
    environment:
      DEBUG_LOGGING: "true"
      SPRING_PROFILES_ACTIVE: dev
    ports:
      - "8992:8992"   # expose bot API directly for local testing
      - "5005:5005"   # JVM remote debug port
    volumes:
      # Mount source for hot-reload (requires spring-boot-devtools)
      - ./bot/src:/app/src:ro
      - ./bot/src/main/resources/cards:/app/resources/cards:ro

  frontend:
    # Use Next.js dev server instead of built image
    build:
      target: dev
    ports:
      - "3674:3000"   # expose frontend directly
    environment:
      NODE_ENV: development

  db:
    ports:
      - "5432:5432"   # expose postgres for local DB tools (DBeaver etc.)

  redis:
    ports:
      - "6379:6379"   # expose redis for local inspection
