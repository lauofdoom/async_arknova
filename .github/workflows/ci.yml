name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ── Bot: Java Build + Tests ─────────────────────────────────────────────────
  bot:
    name: Bot (Java 21)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: arknova_test
          POSTGRES_USER: arknova
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: bot

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and test
        env:
          DATABASE_URL: postgresql://arknova:testpassword@localhost:5432/arknova_test
          REDIS_URL: redis://localhost:6379
          DISCORD_TOKEN: placeholder_token_for_ci
          DISCORD_CLIENT_ID: "000000000000000000"
          JWT_SECRET: ci_test_secret_at_least_32_characters_long
          SPRING_PROFILES_ACTIVE: test
        run: mvn verify -B

      - name: Check code style
        run: mvn spotless:check -B

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bot-test-reports
          path: bot/target/surefire-reports/

  # ── Scripts: TypeScript Type-Check ─────────────────────────────────────────
  scripts:
    name: Scripts (TypeScript)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: scripts

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: scripts/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

  # ── Frontend: Next.js Build + Lint ─────────────────────────────────────────
  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Build
        env:
          API_BASE_URL: http://localhost:8080
        run: npm run build

  # ── Docker: Build Images ────────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [bot, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build bot image
        uses: docker/build-push-action@v6
        with:
          context: ./bot
          push: false
          tags: arknova-bot:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: arknova-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
