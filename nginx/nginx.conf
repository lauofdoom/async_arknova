events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml;

    # File upload limit (for card images etc.)
    client_max_body_size 10m;

    # ── API / Bot ──────────────────────────────────────────────────────────────
    upstream bot_upstream {
        server bot:8080;
    }

    # ── Frontend ───────────────────────────────────────────────────────────────
    upstream frontend_upstream {
        server frontend:3000;
    }

    server {
        listen 80;
        server_name _;

        # Serve pre-rendered images directly from shared volume
        location /images/ {
            alias /srv/images/;
            expires 1h;
            add_header Cache-Control "public";
        }

        # API calls go to Spring Boot bot
        location /api/ {
            proxy_pass http://bot_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # SSE support (game event streams)
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
        }

        # Everything else goes to Next.js frontend
        location / {
            proxy_pass http://frontend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support for Next.js HMR (dev only, harmless in prod)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
